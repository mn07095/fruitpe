<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프루피 | 산지직송 과일채소</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./data.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body data-page="home">
    <header class="topbar">
      <button class="icon-btn" aria-label="메뉴">☰</button>
      <a class="brand" href="./index.html" aria-label="프루피 홈">
        <span class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 96 60" role="img">
            <path class="logo-face" d="M24 18c2 20 20 32 40 24 8-3 14-9 18-17" />
            <path class="logo-leaf" d="M17 20c-8-7-16-5-19-3 4 8 12 10 20 6" />
            <path class="logo-banana" d="M31 42c18 6 42 0 54-21l11 2-1 8-8-1c-8 20-30 30-54 22-8-3-14-7-18-13 6 1 10 2 16 3z" />
            <circle class="logo-grape" cx="78" cy="34" r="7" />
            <circle class="logo-grape" cx="88" cy="42" r="7" />
            <circle class="logo-grape" cx="76" cy="49" r="7" />
            <circle cx="34" cy="18" r="3.4" />
            <circle cx="56" cy="17" r="3.4" />
          </svg>
        </span>
        <span>프루피</span>
      </a>
      <a class="icon-btn" href="./cart.html" aria-label="장바구니">🛒</a>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p>이달의 제철 장보기</p>
          <h1>산지에서 온 과일과 채소를 오늘 특가로</h1>
          <a class="primary-btn" href="./category.html?type=fruit">지금 둘러보기</a>
        </div>
      </section>

      <nav class="quick-tabs menu-grid" aria-label="주요 메뉴">
        <a href="./category.html?type=fruit">과일</a>
        <a href="./category.html?type=vegetable">채소</a>
        <a href="#best">실시간 HOT</a>
        <a href="#sale">타임특가</a>
        <a href="#season">제철추천</a>
        <a href="./mypage.html">멤버십</a>
        <a href="./wishlist.html">찜한상품</a>
        <a href="./checkout.html">바로주문</a>
      </nav>

      <section class="coupon-band">
        <span>웰컴 쿠폰팩</span>
        <strong>첫 구매 3,000원 할인</strong>
        <button type="button">받기</button>
      </section>

      <section class="section" id="season">
        <div class="section-title">
          <h2>오늘의 타임특가</h2>
          <a href="./category.html">전체보기</a>
        </div>
        <div class="flyer-row">
          <a class="flyer flyer-banana" href="./product.html?id=banana">
            <span>18:00 종료</span>
            <strong>고당도 바나나<br />한 송이 4,900원</strong>
          </a>
          <a class="flyer flyer-cucumber" href="./product.html?id=cucumber">
            <span>MD 검수</span>
            <strong>미니오이 1kg<br />새벽 입고</strong>
          </a>
        </div>
      </section>

      <section class="section trust-strip">
        <article><strong>100%</strong><span>신선 책임 보장</span></article>
        <article><strong>24h</strong><span>산지 검수 출고</span></article>
        <article><strong>4.8</strong><span>평균 구매 평점</span></article>
      </section>

      <section class="section" id="best">
        <div class="section-title">
          <h2>실시간 HOT</h2>
          <a href="./category.html">더보기</a>
        </div>
        <div class="product-grid" id="bestProducts"></div>
      </section>

      <section class="section soft" id="sale">
        <div class="section-title">
          <h2>산지직송 특가</h2>
          <a href="./category.html?badge=deal">모두보기</a>
        </div>
        <div class="product-list" id="dealProducts"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="하단 메뉴">
      <a class="active" href="./index.html">홈</a>
      <a href="./category.html">상품</a>
      <a href="./cart.html">장바구니</a>
      <a href="./mypage.html">마이</a>
    </nav>
  </body>
</html>
