<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문서 | 프루피</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./data.js"></script>
    <script defer src="./app.js"></script>
    <script defer src="./nav.js"></script>
  </head>
  <body data-page="checkout" data-nav="orders">
    <header class="topbar">
      <a class="icon-btn" href="./cart.html" aria-label="뒤로">‹</a>
      <a class="brand" href="./index.html" aria-label="프루피 홈">
        <img src="./logo.svg" alt="" class="brand-logo" />
        <span>주문서</span>
      </a>
      <span class="icon-space"></span>
    </header>

    <main>
      <section class="page-head compact">
        <p>로그인 없이 바로 주문</p>
        <h1>배송 정보를 확인해주세요</h1>
      </section>
      <form class="order-form">
        <label>받는 분<input type="text" value="프루피 고객" /></label>
        <label>연락처<input type="tel" value="010-0000-0000" /></label>
        <label>주소<input type="text" value="서울특별시 성동구 과일로 12" /></label>
        <label>배송 요청사항<textarea>문 앞에 놓아주세요.</textarea></label>
      </form>
      <section class="section">
        <div class="total-box">
          <span>결제 예정 금액</span>
          <strong id="checkoutTotal">0원</strong>
        </div>
        <button class="checkout-btn" type="button">결제하기</button>
      </section>
    </main>
    <nav class="bottom-nav icon-nav" data-bottom-nav aria-label="하단 메뉴"></nav>
  </body>
</html>
