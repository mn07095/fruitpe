<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | 프루피</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./data.js"></script>
    <script defer src="./app.js"></script>
    <script defer src="./nav.js"></script>
  </head>
  <body data-page="cart">
    <header class="topbar">
      <a class="icon-btn" href="./index.html" aria-label="뒤로">‹</a>
      <a class="brand" href="./index.html"><img class="logo-mark" src="./logo.svg" alt="" /><span>장바구니</span></a>
      <button class="icon-btn" type="button" data-cart-clear aria-label="비우기">×</button>
    </header>
    <main>
      <section class="page-head compact"><p>3만원 이상 무료배송</p><h1>담은 상품을 확인해주세요</h1></section>
      <section class="section cart-section">
        <div class="cart-list" id="cartItems"></div>
        <div class="coupon-box"><div><strong>첫 구매 쿠폰</strong><p>상품 금액 15,000원 이상이면 3,000원 할인</p></div><button type="button" data-coupon-apply>적용</button></div>
        <div class="cart-summary" id="cartSummary"></div>
        <a class="checkout-btn" id="cartCheckout" href="./checkout.html">주문하기</a>
      </section>
      <section class="section soft"><div class="section-title"><h2>함께 담기 좋은 상품</h2><a href="./category.html">더보기</a></div><div class="product-list" id="cartRecommendations"></div></section>
    </main>
    <nav class="bottom-nav icon-nav" data-bottom-nav aria-label="하단 메뉴"></nav>
  </body>
</html>
